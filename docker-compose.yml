services:
  archon-server:
    build:
      context: ./python
      dockerfile: Dockerfile.server
    expose:
      - "${ARCHON_SERVER_PORT:-8181}"
    environment:
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_SERVICE_KEY: "${SUPABASE_SERVICE_KEY}"
      SERVICE_DISCOVERY_MODE: "${SERVICE_DISCOVERY_MODE:-docker_compose}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      ARCHON_SERVER_PORT: "${ARCHON_SERVER_PORT:-8181}"
      ARCHON_MCP_PORT: "${ARCHON_MCP_PORT:-8051}"
      AGENTS_ENABLED: "${AGENTS_ENABLED:-false}"
      PROD: "${PROD:-true}"
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.archon-server.rule=Host(`api-archon.getcoldwolf.com`)
      - traefik.http.routers.archon-server.entrypoints=https
      - traefik.http.routers.archon-server.tls.certresolver=letsencrypt
      - traefik.http.services.archon-server.loadbalancer.server.port=8181
    networks:
      - coolify
    restart: always

  archon-mcp:
    build:
      context: ./python
      dockerfile: Dockerfile.mcp
    expose:
      - "${ARCHON_MCP_PORT:-8051}"
    environment:
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_SERVICE_KEY: "${SUPABASE_SERVICE_KEY}"
      SERVICE_DISCOVERY_MODE: "${SERVICE_DISCOVERY_MODE:-docker_compose}"
      TRANSPORT: "sse"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      API_SERVICE_URL: "http://archon-server:${ARCHON_SERVER_PORT:-8181}"
      AGENTS_ENABLED: "${AGENTS_ENABLED:-false}"
      ARCHON_MCP_PORT: "${ARCHON_MCP_PORT:-8051}"
      ARCHON_SERVER_PORT: "${ARCHON_SERVER_PORT:-8181}"
      PROD: "${PROD:-true}"
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.archon-mcp.rule=Host(`mcp-archon.getcoldwolf.com`)
      - traefik.http.routers.archon-mcp.entrypoints=https
      - traefik.http.routers.archon-mcp.tls.certresolver=letsencrypt
      - traefik.http.services.archon-mcp.loadbalancer.server.port=8051
    networks:
      - coolify
    depends_on:
      - archon-server
    restart: always

  archon-frontend:
    build:
      context: ./archon-ui-main
    expose:
      - "${ARCHON_UI_PORT:-3737}"
    environment:
      VITE_ARCHON_SERVER_PORT: "${ARCHON_SERVER_PORT:-8181}"
      ARCHON_SERVER_PORT: "${ARCHON_SERVER_PORT:-8181}"
      PROD: "${PROD:-true}"
      DOCKER_ENV: "${DOCKER_ENV:-true}"
      VITE_ALLOWED_HOSTS: "${FRONTEND_DOMAIN:-archon-tasks.getcoldwolf.com}"
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.archon-frontend.rule=Host(`archon-tasks.getcoldwolf.com`)
      - traefik.http.routers.archon-frontend.entrypoints=https
      - traefik.http.routers.archon-frontend.tls.certresolver=letsencrypt
      - traefik.http.services.archon-frontend.loadbalancer.server.port=3737
    networks:
      - coolify
    depends_on:
      - archon-server
    restart: always

networks:
  coolify:
    external: true
