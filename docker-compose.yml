# =============================================================================
# Archon - Docker Compose (Coolify Traefik optimized)
# =============================================================================

services:
  app:
    build: .
    image: archon
    env_file: .env
    environment:
      ARCHON_DOCKER: "true"
      # If using Supabase as before, this will use it. Otherwise defaults to SQLite.
      DATABASE_URL: "${SUPABASE_URL}"
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ${ARCHON_DATA:-archon_data}:/.archon
    networks:
      - coolify
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.archon.rule=Host(`archon-tasks.getcoldwolf.com`)
      - traefik.http.routers.archon.entrypoints=https
      - traefik.http.routers.archon.tls.certresolver=letsencrypt
      - traefik.http.services.archon.loadbalancer.server.port=3000

volumes:
  archon_data:

networks:
  coolify:
    external: true
